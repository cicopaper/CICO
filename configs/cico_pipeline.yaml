# CICO pipeline reproduction config.
# Replace the placeholder paths with local checkpoints or published Hugging Face model IDs.

models:
  splitter:
    model_name_or_path: cicopaper/cico-splitter
    base_url: http://0.0.0.0:34567/v1
    api_key: token-abc
    temperature: 0.1
    service:
      cuda_visible_devices: 0
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.9
      max_model_len: 8192
      extra_args: []
  planner:
    model_name_or_path: cicopaper/cico-planner
    base_url: http://0.0.0.0:34568/v1
    api_key: token-abc
    temperature: 0.1
    service:
      cuda_visible_devices: 1
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.9
      max_model_len: 8192
      extra_args: []
  embedding:
    model_name_or_path: Qwen/Qwen3-Embedding-8B
    base_url: http://0.0.0.0:3456/v1
    api_key: token-abc
    dimension: 4096
    batch_size: 8
    service:
      cuda_visible_devices: 2
      max_seq_length: 16384
  generator:
    model_name_or_path: Qwen/Qwen2.5-Coder-14B-Instruct
    base_url: http://0.0.0.0:34569/v1
    api_key: token-abc
    temperature: 0.1
    max_tokens: 2048
    service:
      cuda_visible_devices: 3,4
      tensor_parallel_size: 2
      gpu_memory_utilization: 0.9
      max_model_len: 32768
      extra_args: []

pipeline:
  language: py
  cache_dir: .cico_cache
  force_rebuild: false
  retrieve_top_k_per_plan: 3
  retrieve_final_top_k: 8
  max_context_chars: 16000

prompts:
  planner_system: >-
    Generate a set of comments representing key submodules needed to implement
    the given query, and return the list in JSON format.
  generator_system: >-
    You are a code generation assistant. Use the retrieved repository context to
    answer the user query.
